          let weekStatus = { fresh: null, archived: [] };

          let currentGallery = [];
          let currentIndex = 0;

          function getWeekNumber(w) {
            const m = String(w).match(/week(\d+)/i);
            return m ? parseInt(m[1], 10) : 0;
          }

          function updateWeekStatus() {
            const weeks = [...new Set(articlesData.map((a) => a.weekGroup))];
            if (!weeks.length) {
              weekStatus = { fresh: null, archived: [] };
              return;
            }
            const sorted = [...weeks].sort((a, b) => getWeekNumber(b) - getWeekNumber(a));
            weekStatus = { fresh: sorted[0], archived: sorted.slice(1) };
          }

          function escapeHtml(str) {
            if (!str) return "";
            return String(str).replace(/[&<>"']/g, (m) => ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            })[m]);
          }

          function getWeekInfo(weekGroup) {
            const arts = articlesData.filter((a) => a.weekGroup === weekGroup);
            return {
              title: `Выпуск #${getWeekNumber(weekGroup)}`,
              date: arts[0]?.date || "",
            };
          }

          function renderArticleCard(article) {
            const images = article.images || [];
            const safeTitle = escapeHtml(article.title || "Фото");
            // Сохраняем JSON массива в data-атрибут для восстановления галереи
            const galleryJson = escapeHtml(JSON.stringify(images));
            const imagesHtml = images.length
              ? `
              <div class="collage">
                <div class="collage-grid" data-count="${images.length}" data-gallery='${galleryJson}'>
                  ${images.map((src, idx) => `<div class="collage-item" data-fullsrc="${escapeHtml(src)}" data-index="${idx}" role="button" tabindex="0" aria-label="Открыть фото: ${safeTitle}"><img src="${escapeHtml(src)}" loading="lazy" alt="${safeTitle}"></div>`).join("")}
                </div>
              </div>
              <div class="photo-count-badge"><i class="fas fa-images" aria-hidden="true"></i> ${images.length}</div>
            `
              : "";

            return `
              <article class="card">
                ${imagesHtml}
                <div class="card-content">
                  <span class="date">${escapeHtml(article.date || "")}</span>
                  <h2>${escapeHtml(article.title || "")}</h2>
                  ${article.text || ""}
                </div>
              </article>
            `;
          }

          function renderWeeksFeed() {
            const container = document.getElementById("mainContent");
            const wrapper = document.getElementById("showAllBtnWrapper");

            if (!articlesData.length) {
              container.innerHTML = '<p style="text-align:center;padding:40px;color:#888;">Пока нет новостей.</p>';
              wrapper.style.display = "none";
              return;
            }

            let html = "";
            const fresh = weekStatus.fresh;
            const arch = weekStatus.archived;

            if (fresh) {
              const arts = articlesData.filter((a) => a.weekGroup === fresh);
              if (arts.length) {
                const info = getWeekInfo(fresh);
                const weekId = `week-content-${fresh}`;
                html += `
                  <div class="week-section">
                    <div class="week-header" role="button" tabindex="0" aria-expanded="true" aria-controls="${weekId}" data-week="${fresh}">
                      <div class="week-header-left">
                        <span class="week-badge">Свежий</span>
                        <span class="week-title">${escapeHtml(info.title)}</span>
                        <span class="week-date">${escapeHtml(info.date)}</span>
                      </div>
                      <div><i class="fas fa-chevron-down toggle-icon" aria-hidden="true"></i></div>
                    </div>
                    <div class="week-content" id="${weekId}">
                      ${arts.map(renderArticleCard).join("")}
                    </div>
                  </div>
                `;
              }
            }

            if (arch.length) {
              html += `<div id="archivesTitle" class="archives-title ${showArchives ? "visible" : ""}"><i class="fas fa-history" aria-hidden="true"></i> Архивные выпуски</div>`;
              html += `<div id="archivesSection">`;
              arch.forEach((wid) => {
                const arts = articlesData.filter((a) => a.weekGroup === wid);
                if (arts.length) {
                  const info = getWeekInfo(wid);
                  const weekId = `week-content-${wid}`;
                  html += `
                    <div class="week-section archive-section ${showArchives ? "visible" : ""}">
                      <div class="week-header collapsed" role="button" tabindex="0" aria-expanded="false" aria-controls="${weekId}" data-week="${wid}">
                        <div class="week-header-left">
                          <span class="week-badge archived">Архив</span>
                          <span class="week-title">${escapeHtml(info.title)}</span>
                          <span class="week-date">${escapeHtml(info.date)}</span>
                        </div>
                        <div><i class="fas fa-chevron-down toggle-icon" aria-hidden="true"></i></div>
                      </div>
                      <div class="week-content collapsed" id="${weekId}">
                        ${arts.map(renderArticleCard).join("")}
                      </div>
                    </div>
                  `;
                }
              });
              html += `</div>`;
              wrapper.style.display = "block";
            } else {
              wrapper.style.display = "none";
            }

            container.innerHTML = html;
          }

          function toggleWeek(header) {
            const isCollapsed = header.classList.contains("collapsed");
            const content = header.nextElementSibling;

            header.classList.toggle("collapsed");
            content.classList.toggle("collapsed");
            header.setAttribute("aria-expanded", isCollapsed ? "true" : "false");
          }

          // ========== ЛАЙТБОКС ==========
          function openLightbox(gallery, index) {
            currentGallery = gallery;
            currentIndex = index;
            updateLightboxImage();

            const modal = document.getElementById("lightboxModal");
            modal.classList.add("active");
            modal.classList.toggle("single", gallery.length <= 1);
            document.body.style.overflow = "hidden";
            document.getElementById("mainContent").setAttribute("inert", "true");
          }

          function updateLightboxImage() {
            const img = document.getElementById("lightboxImage");
            const counter = document.getElementById("lightboxCounter");
            const prevBtn = document.getElementById("lightboxPrev");
            const nextBtn = document.getElementById("lightboxNext");

            img.style.opacity = "0";
            setTimeout(() => {
              img.src = currentGallery[currentIndex];
              img.style.opacity = "1";
            }, 100);

            counter.textContent = `${currentIndex + 1} / ${currentGallery.length}`;
            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === currentGallery.length - 1;
          }

          function showPrev() {
            if (currentIndex > 0) {
              currentIndex--;
              updateLightboxImage();
            }
          }

          function showNext() {
            if (currentIndex < currentGallery.length - 1) {
              currentIndex++;
              updateLightboxImage();
            }
          }

          function closeLightbox() {
            const modal = document.getElementById("lightboxModal");
            modal.classList.remove("active");
            document.getElementById("lightboxImage").src = "";
            document.body.style.overflow = "";
            document.getElementById("mainContent").removeAttribute("inert");
            currentGallery = [];
            currentIndex = 0;
          }

          function initEvents() {
            const mainContent = document.getElementById("mainContent");

            mainContent.addEventListener("click", (e) => {
              const header = e.target.closest(".week-header");
              if (header) {
                toggleWeek(header);
                return;
              }

              const collageItem = e.target.closest(".collage-item");
              if (collageItem) {
                const grid = collageItem.closest(".collage-grid");
                const gallery = JSON.parse(grid.dataset.gallery || "[]");
                const index = parseInt(collageItem.dataset.index || "0", 10);
                if (gallery.length) {
                  openLightbox(gallery, index);
                }
              }
            });

            mainContent.addEventListener("keydown", (e) => {
              const collageItem = e.target.closest(".collage-item");
              if (collageItem && (e.key === "Enter" || e.key === " ")) {
                e.preventDefault();
                collageItem.click();
              }

              const header = e.target.closest(".week-header");
              if (header && (e.key === "Enter" || e.key === " ")) {
                e.preventDefault();
                toggleWeek(header);
              }
            });

            // Лайтбокс
            const modal = document.getElementById("lightboxModal");
            const closeBtn = document.getElementById("closeLightbox");
            const prevBtn = document.getElementById("lightboxPrev");
            const nextBtn = document.getElementById("lightboxNext");

            closeBtn.onclick = closeLightbox;
            prevBtn.onclick = showPrev;
            nextBtn.onclick = showNext;

            modal.addEventListener("click", (e) => {
              if (e.target === modal) closeLightbox();
            });

            document.addEventListener("keydown", (e) => {
              if (!modal.classList.contains("active")) return;
              if (e.key === "Escape") {
                closeLightbox();
              } else if (e.key === "ArrowLeft") {
                e.preventDefault();
                showPrev();
              } else if (e.key === "ArrowRight") {
                e.preventDefault();
                showNext();
              }
            });

            // Свайпы на мобильных
            let touchStartX = 0;
            let touchEndX = 0;

            modal.addEventListener("touchstart", (e) => {
              touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            modal.addEventListener("touchend", (e) => {
              touchEndX = e.changedTouches[0].screenX;
              const diff = touchStartX - touchEndX;
              if (Math.abs(diff) > 50) {
                if (diff > 0) {
                  showNext();
                } else {
                  showPrev();
                }
              }
            }, { passive: true });

            // Кнопка "Все выпуски"
            document.getElementById("expandAllBtn").onclick = function() {
              showArchives = !showArchives;
              this.setAttribute("aria-expanded", showArchives);

              document.querySelectorAll(".week-section.archive-section").forEach((s) => {
                s.classList.toggle("visible", showArchives);
              });

              const title = document.getElementById("archivesTitle");
              if (title) title.classList.toggle("visible", showArchives);

              const btnSpan = this.querySelector("span");
              btnSpan.innerHTML = showArchives
                ? '<i class="fas fa-compress-alt" aria-hidden="true"></i> Скрыть выпуски'
                : '<i class="fas fa-archive" aria-hidden="true"></i> Все выпуски';
            };
          }

          // Запуск
          document.addEventListener("DOMContentLoaded", () => {
            updateWeekStatus();
            renderWeeksFeed();
            initEvents();
          });
    </script>
  </body>
</html>
